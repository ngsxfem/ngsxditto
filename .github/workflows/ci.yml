name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install mkl
          pip install -r docs/requirements.txt
          pip install pyvista
          pip install .

      - name: Set MKL library path
        run: |
          echo "=== pip show -f mkl (lib files) ==="
          pip show -f mkl 2>/dev/null | grep -E "\.so|lib" | head -20 || true
          echo "=== find pythonLocation for libmkl* ==="
          find "$pythonLocation" -name "libmkl*" 2>/dev/null | head -10 || echo "Not found"
          echo "=== find /usr /opt for libmkl* ==="
          find /usr /opt -name "libmkl*" 2>/dev/null | head -10 || echo "Not found"
          echo "=== ldconfig -p | grep mkl ==="
          ldconfig -p 2>/dev/null | grep mkl || echo "Not in ldconfig"
          echo "=== importlib.metadata for mkl deps ==="
          python -c "
import importlib.metadata
for pkg in ['mkl','intel-openmp','tbb','onemkl-license']:
    try:
        files = importlib.metadata.files(pkg) or []
        for f in files:
            s = str(f)
            if '.so' in s or 'lib' in s.lower():
                print(f'{pkg}: {f.locate()}')
    except Exception as e:
        print(f'{pkg}: {e}')
" 2>/dev/null | head -20 || true
          MKL_SO=$(find "$pythonLocation" /usr /opt -name "libmkl_rt.so.2" 2>/dev/null | head -1)
          if [ -n "$MKL_SO" ]; then
            echo "Found MKL at: $MKL_SO"
            echo "LD_LIBRARY_PATH=$(dirname "$MKL_SO"):${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          else
            echo "WARNING: libmkl_rt.so.2 not found anywhere!"
          fi

      - name: Verify import
        run: python -c "import ngsxditto"

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install mkl
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Set MKL library path
        run: |
          MKL_SO=$(find "$pythonLocation" -name "libmkl_rt.so.2" 2>/dev/null | head -1)
          if [ -n "$MKL_SO" ]; then
            echo "LD_LIBRARY_PATH=$(dirname "$MKL_SO"):${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          fi

      - name: Run tests
        run: pytest --cov=ngsxditto --cov-report=xml:coverage.xml --cov-report=term-missing --cov-report=html tests/test_*.py

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage.xml
            htmlcov/

  build-pages:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmesa6-dev libgl1 mesa-utils pandoc make

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: htmlcov/

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install mkl
          pip install -r docs/requirements.txt
          pip install .

      - name: Set MKL library path
        run: |
          MKL_SO=$(find "$pythonLocation" -name "libmkl_rt.so.2" 2>/dev/null | head -1)
          if [ -n "$MKL_SO" ]; then
            echo "LD_LIBRARY_PATH=$(dirname "$MKL_SO"):${LD_LIBRARY_PATH}" >> $GITHUB_ENV
          fi

      - name: Generate documentation
        env:
          PYVISTA_OFF_SCREEN: "true"
          VTK_DEFAULT_RENDER_WINDOW_OFFSCREEN: "true"
          DISPLAY: ":99.0"
        run: |
          mkdir -p docs/htmlcov
          cp -r htmlcov/* docs/htmlcov/ || true
          cd docs
          ./generate_docs.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-package:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install .
          pip install build twine
          python -m build

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: dist/

      - name: Note
        run: echo "Package built successfully, not uploading anywhere."
